name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version with tag
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" '.version = $v' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Stage common payload
        run: |
          mkdir -p stage
          cp -r assets config src manifest.json stage/

      - name: Build Chrome zip
        run: |
          mkdir -p dist
          cp -r stage chrome
          (cd chrome && zip -qr "../dist/claudescope-chrome-${{ steps.ver.outputs.version }}.zip" .)

      - name: Build Firefox unsigned source XPI
        run: |
          cp -r stage firefox
          jq '. + {browser_specific_settings: {gecko: {id: "claudescope@ogarniamy.ai", strict_min_version: "115.0"}}}' \
            firefox/manifest.json > firefox/manifest.tmp
          mv firefox/manifest.tmp firefox/manifest.json
          (cd firefox && zip -qr "../dist/claudescope-firefox-${{ steps.ver.outputs.version }}-source.xpi" .)

      - name: Upload web artifacts
        uses: actions/upload-artifact@v5
        with:
          name: web
          path: |
            dist/claudescope-chrome-${{ steps.ver.outputs.version }}.zip
            dist/claudescope-firefox-${{ steps.ver.outputs.version }}-source.xpi
          if-no-files-found: error

  publish:
    needs: [build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
