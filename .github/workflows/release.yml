name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version with tag
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" '.version = $v' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Stage common payload
        run: |
          mkdir -p stage
          cp -r assets config src manifest.json stage/

      - name: Build Chrome zip
        run: |
          mkdir -p dist
          cp -r stage chrome
          (cd chrome && zip -qr "../dist/claudex-chrome-${{ steps.ver.outputs.version }}.zip" .)

      - name: Build Firefox signed XPI
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          cp -r stage firefox
          jq '. + {browser_specific_settings: {gecko: {id: "claudex@ogarniamy.ai", strict_min_version: "115.0"}}}' \
            firefox/manifest.json > firefox/manifest.tmp
          mv firefox/manifest.tmp firefox/manifest.json
          npx --yes web-ext@8 sign \
            --source-dir=firefox \
            --artifacts-dir=dist \
            --channel=unlisted
          mv dist/*.xpi "dist/claudex-firefox-${{ steps.ver.outputs.version }}.xpi"

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: |
            dist/claudex-chrome-${{ steps.ver.outputs.version }}.zip
            dist/claudex-firefox-${{ steps.ver.outputs.version }}.xpi
          if-no-files-found: error

  build-safari:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version with tag
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" '.version = $v' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Stage extension payload
        run: |
          mkdir -p stage
          cp -r assets config src manifest.json stage/

      - name: Convert to Safari Web Extension project
        run: |
          mkdir -p build
          xcrun safari-web-extension-converter stage \
            --project-location build \
            --app-name ClaudeX \
            --bundle-identifier ai.ogarniamy.claudex \
            --swift \
            --no-open \
            --no-prompt \
            --force

      - name: Build Safari app
        run: |
          PROJECT="$(find build -maxdepth 3 -name '*.xcodeproj' -print -quit)"
          if [ -z "$PROJECT" ]; then
            echo "No Xcode project produced by converter" >&2
            exit 1
          fi
          echo "Building $PROJECT"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "ClaudeX (macOS)" \
            -configuration Release \
            -derivedDataPath build/derived \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package Safari app
        run: |
          mkdir -p dist
          APP="$(find build/derived/Build/Products/Release -maxdepth 2 -name 'ClaudeX.app' -print -quit)"
          if [ -z "$APP" ]; then
            echo "ClaudeX.app not found in build products" >&2
            find build/derived/Build/Products -maxdepth 3 -print >&2 || true
            exit 1
          fi
          STAGE_DIR="$(mktemp -d)"
          cp -R "$APP" "$STAGE_DIR/ClaudeX.app"
          (cd "$STAGE_DIR" && zip -qry "$GITHUB_WORKSPACE/dist/claudex-safari-${{ steps.ver.outputs.version }}.zip" ClaudeX.app)

      - name: Upload Safari artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari
          path: dist/claudex-safari-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

  publish:
    needs: [build-web, build-safari]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
