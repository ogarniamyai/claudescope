name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version with tag
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" '.version = $v' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Stage common payload
        run: |
          mkdir -p stage
          cp -r assets config src manifest.json stage/

      - name: Build Chrome zip
        run: |
          mkdir -p dist
          cp -r stage chrome
          (cd chrome && zip -qr "../dist/claudex-chrome-${{ steps.ver.outputs.version }}.zip" .)

      - name: Build Firefox signed XPI
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          AMO_CHANNEL: ${{ vars.AMO_CHANNEL || 'unlisted' }}
        run: |
          cp -r stage firefox
          jq '. + {browser_specific_settings: {gecko: {id: "claudex@ogarniamy.ai", strict_min_version: "115.0"}}}' \
            firefox/manifest.json > firefox/manifest.tmp
          mv firefox/manifest.tmp firefox/manifest.json
          npx --yes web-ext@8 sign \
            --source-dir=firefox \
            --artifacts-dir=dist \
            --channel="$AMO_CHANNEL"
          mv dist/*.xpi "dist/claudex-firefox-${{ steps.ver.outputs.version }}.xpi"

      - name: Upload to Chrome Web Store (draft)
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        if: env.CWS_EXTENSION_ID != ''
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "dist/claudex-chrome-${{ steps.ver.outputs.version }}.zip" \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN"
          echo "Wgrane do CWS jako draft. Wejdz w dashboard i kliknij Submit for review."

      - name: Upload web artifacts
        uses: actions/upload-artifact@v5
        with:
          name: web
          path: |
            dist/claudex-chrome-${{ steps.ver.outputs.version }}.zip
            dist/claudex-firefox-${{ steps.ver.outputs.version }}.xpi
          if-no-files-found: error

  publish:
    needs: [build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
